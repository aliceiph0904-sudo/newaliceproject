<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Alisa Tolstikova — Personal Website</title>
    <meta name="description" content="Personal website of Alisa Tolstikova: resume, contacts, and portfolio.">
    <meta property="og:title" content="Alisa Tolstikova — Personal Website">
    <meta property="og:description" content="Resume, contacts, and portfolio of Alisa Tolstikova.">
    <meta property="og:type" content="website">
    <meta property="og:image" content="img/profile.jpg">
    <link rel="icon" type="image/jpeg" href="img/profile.jpg">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
  </head>
  <body>
    <main class="d-flex align-items-center justify-content-center min-vh-100">
      <div class="card text-center shadow-sm p-4" style="max-width:480px; width:90%;">
        <div class="lang-toggle" role="group" aria-label="Language switcher">
          <button id="lang-en" class="btn btn-outline-secondary btn-sm lang-option" type="button" aria-label="Switch to English" aria-pressed="true">EN</button>
          <button id="lang-ru" class="btn btn-outline-secondary btn-sm lang-option" type="button" aria-label="Переключить на русский" aria-pressed="false">RU</button>
        </div>
        <img src="img/profile.jpg" alt="Photo of Alisa Tolstikova" class="profile-img mx-auto d-block mb-3" id="profile-photo">
        <h1 class="h3 mb-1" id="person-name">Alisa Tolstikova</h1>
        <p class="text-muted mb-3" id="person-role">Management Student</p>

        <section class="mb-3">
          <h2 class="h5" id="resume-title">Resume</h2>
          <a class="btn btn-primary mt-2" href="cv%20in%20English.pdf" target="_blank" rel="noopener" id="resume-button">Download Resume</a>
        </section>

        <hr>

        <section>
          <h2 class="h5" id="contacts-title">Contacts</h2>
          <ul class="list-unstyled mb-0">
            <li><a href="mailto:aliska_tolstikova@mail.ru">aliska_tolstikova@mail.ru</a></li>
            <li><a href="https://vk.ru/alisatol0904" target="_blank" rel="noopener" id="vk-link">VKontakte</a></li>
          </ul>
        </section>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      const translations = {
        en: {
          htmlLang: 'en',
          pageTitle: 'Alisa Tolstikova — Personal Website',
          metaDescription: 'Personal website of Alisa Tolstikova: resume, contacts, and portfolio.',
          ogTitle: 'Alisa Tolstikova — Personal Website',
          ogDescription: 'Resume, contacts, and portfolio of Alisa Tolstikova.',
          profileAlt: 'Photo of Alisa Tolstikova',
          personName: 'Alisa Tolstikova',
          personRole: 'Management Student',
          resumeTitle: 'Resume',
          resumeButton: 'Download Resume',
          resumeHref: 'cv%20in%20English.pdf',
          contactsTitle: 'Contacts',
          vkLink: 'VKontakte'
        },
        ru: {
          htmlLang: 'ru',
          pageTitle: 'Алиса Толстикова — Сайт-визитка',
          metaDescription: 'Личный сайт Алисы Толстиковой: резюме, контакты и портфолио.',
          ogTitle: 'Алиса Толстикова — Сайт-визитка',
          ogDescription: 'Резюме, контакты и портфолио Алисы Толстиковой.',
          profileAlt: 'Фото Алисы Толстиковой',
          personName: 'Алиса Толстикова',
          personRole: 'Студентка направления «Менеджмент»',
          resumeTitle: 'Резюме',
          resumeButton: 'Скачать резюме',
          resumeHref: 'assets/cv%203.pdf',
          contactsTitle: 'Контакты',
          vkLink: 'ВКонтакте'
        }
      };

      const metaDescription = document.querySelector('meta[name="description"]');
      const ogTitle = document.querySelector('meta[property="og:title"]');
      const ogDescription = document.querySelector('meta[property="og:description"]');
      const langEn = document.getElementById('lang-en');
      const langRu = document.getElementById('lang-ru');

      function applyLanguage(language) {
        const content = translations[language];

        document.documentElement.lang = content.htmlLang;
        document.title = content.pageTitle;
        metaDescription.setAttribute('content', content.metaDescription);
        ogTitle.setAttribute('content', content.ogTitle);
        ogDescription.setAttribute('content', content.ogDescription);

        langEn.classList.toggle('active-language', language === 'en');
        langRu.classList.toggle('active-language', language === 'ru');
        langEn.setAttribute('aria-pressed', language === 'en' ? 'true' : 'false');
        langRu.setAttribute('aria-pressed', language === 'ru' ? 'true' : 'false');
        document.getElementById('profile-photo').setAttribute('alt', content.profileAlt);
        document.getElementById('person-name').textContent = content.personName;
        document.getElementById('person-role').textContent = content.personRole;
        document.getElementById('resume-title').textContent = content.resumeTitle;
        const resumeButton = document.getElementById('resume-button');
        resumeButton.textContent = content.resumeButton;
        resumeButton.setAttribute('href', content.resumeHref);
        document.getElementById('contacts-title').textContent = content.contactsTitle;
        document.getElementById('vk-link').textContent = content.vkLink;
      }

      const savedLanguage = localStorage.getItem('siteLanguage');
      const initialLanguage = savedLanguage === 'ru' || savedLanguage === 'en'
        ? savedLanguage
        : (navigator.language.toLowerCase().startsWith('ru') ? 'ru' : 'en');

      applyLanguage(initialLanguage);

      langEn.addEventListener('click', () => {
        applyLanguage('en');
        localStorage.setItem('siteLanguage', 'en');
      });

      langRu.addEventListener('click', () => {
        applyLanguage('ru');
        localStorage.setItem('siteLanguage', 'ru');
      });
    </script>
  </body>
</html>
